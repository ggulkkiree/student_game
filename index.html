<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>외출 준비 앱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>오늘의 외출 준비!</h1>
    
    <div id="settings">
        <label for="difficulty">난이도 선택: </label>
        <select id="difficulty" onchange="changeDifficulty()">
            <option value="1">1단계 (쉬움 - 필수 옷만)</option>
            <option value="2">2단계 (보통 - 약간 헷갈리게)</option>
            <option value="3">3단계 (어려움 - 옷장 가득)</option>
        </select>
    </div>

    <div id="weather-panel">
        <div id="weather-temp" class="weather-item">🌡️ <span></span></div>
        <div id="weather-rain" class="weather-item"><span></span></div>
        <div id="weather-dust" class="weather-item"><span></span></div>
    </div>

    <div id="game-area">
        <div id="character" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

        <div id="wardrobe">
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="tshirt" data-type="top" data-warmth="low" data-level="1">👕</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="padding" data-type="outer" data-warmth="high" data-level="1">🧥</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="pants" data-type="bottom" data-warmth="mid" data-level="1">👖</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="shorts" data-type="bottom" data-warmth="low" data-level="1">🩳</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="umbrella" data-type="accessory" data-rain="true" data-level="1">☂️</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="mask" data-type="accessory" data-dust="true" data-level="1">😷</div>
            
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="sweater" data-type="top" data-warmth="mid" data-level="2">🧶</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="boots" data-type="accessory" data-rain="true" data-level="2">👢</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="scarf" data-type="accessory" data-warmth="mid" data-level="2">🧣</div>

            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="sunglasses" data-type="accessory" data-level="3">🕶️</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="cap" data-type="accessory" data-level="3">🧢</div>
            <div class="clothing-item" draggable="true" ondragstart="drag(event)" id="dress" data-type="top" data-warmth="low" data-level="3">👗</div>
        </div>
    </div>

    <div id="controls">
        <button onclick="checkOutfit()">준비 완료!</button>
    </div>
    
    <div id="feedback"></div>

    <script src="script.js"></script>
</body>
</html>
